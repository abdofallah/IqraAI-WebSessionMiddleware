version: '3.8'

services:
  middleware:
    image: abdofallah/iqraai-websessionmiddleware:latest
    container_name: iqraai_middleware
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /host/path/to/appsettings.json:/app/appsettings.json:ro
    depends_on:
      - redis
    networks:
      - iqraai_network

  redis:
    image: redis:7-alpine
    container_name: iqraai_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - iqraai_network

networks:
  iqraai_network:
    driver: bridge

volumes:
  redis_data: